<div class="p-5 shadow-sm">
    <nav class="flex flex-col md:flex-row items-center justify-between w-full md:w-[92%] mx-auto">
        <div class="text-4xl font-mono text-gray-700 font-semibold mb-4 md:mb-0 md:mr-4">{{ data.name | uppercase }}</div>
        <div class="md:relative flex flex-col items-center">
            <ul class="md:flex md:flex-row md:gap-7 md:items-center hidden" [ngClass]="{'hidden': !showMenu}">
                <li>
                    <a href="#" class="text-2xl font-mono hover:text-accent">About Me</a>
                </li>
                <li>
                    <a href="/home" class="text-2xl font-mono hover:text-accent">Works</a> 
                </li>
                <li>
                    <a href="#" class="text-2xl font-mono hover:text-accent">Contact</a> 
                </li>
            </ul>
            <button class="md:hidden focus:outline-none" (click)="showMenu = !showMenu">
                <ng-container *ngIf="!showMenu">
                    <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </ng-container>
                <ng-container *ngIf="showMenu">
                    <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </ng-container>
            </button>
        </div>
    </nav>
</div>
